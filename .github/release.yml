# Controls how GitHub groups PRs in auto-generated release notes.
# https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - ignore-for-release
      - duplicate
      - invalid
      - wontfix
  categories:
    - title: "Breaking Changes"
      labels:
        - breaking-change
        - semver-major
    - title: "New Features"
      labels:
        - enhancement
        - semver-minor
    - title: "Bug Fixes"
      labels:
        - bug
    - title: "Performance"
      labels:
        - performance
    - title: "Docs"
      labels:
        - documentation
    - title: "Internal"
      labels:
        - refactor
        - chore
        - build
        - ci
    - title: "Other"
      labels:
        - "*"
